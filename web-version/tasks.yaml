prerequisites:
  - id: pkg_stress
    title: "Pacote 'stress' instalado"
    check_command: "dpkg -s stress > /dev/null 2>&1 && echo 'true' || echo 'false'"
  - id: pkg_htop
    title: "Pacote 'htop' instalado"
    check_command: "dpkg -s htop > /dev/null 2>&1 && echo 'true' || echo 'false'"
  - id: pkg_pciutils
    title: "Pacote 'pciutils' instalado"
    check_command: "dpkg -s pciutils > /dev/null 2>&1 && echo 'true' || echo 'false'"
  - id: pkg_git
    title: "Pacote 'git' instalado"
    check_command: "dpkg -s git > /dev/null 2>&1 && echo 'true' || echo 'false'"
  - id: internet_access
    title: "Acesso à Internet"
    check_command: "ping -c 1 8.8.8.8 > /dev/null 2>&1 && echo 'true' || echo 'false'"

activities:
  - id: cpu_model
    category: "Processador"
    title: "Modelo do Processador"
    description: "Qual é modelo exato do processador?"
    type: "input_match"
    check_command: "cat /proc/cpuinfo | grep 'model name' | head -1 | sed 's/.*: //'"

  - id: cpu_threads
    category: "Processador"
    title: "Quantidade de Threads"
    description: "Informe a quantidade de threads do processador."
    type: "input_match"
    check_command: "lscpu | grep 'Thread(s) per core' | sed 's/.*: //' | sed 's/ *//' | cut -d' ' -f1 | head -1" 
  
  - id: proc_running
    category: "Processador"
    title: "Nome do processo"
    description: "Informe qual é o nome do processo que está utilizando mais CPU no momento."
    type: "input_match"
    check_command: "ps -eo comm --sort=-%cpu | head -n 2 | tail -n 1" 

  - id: kill
    category: "Processador"
    title: "Carga de CPU"
    description: "Mate o processo que tem o nome 'so-<*>'."
    type: "passive"
    check_command: "ps ax | egrep -v \"grep|ls\" 2>/dev/null | grep \"$(ls /tmp/unifebe-* 2>/dev/null || echo 'nao-encontrado' )\" > /dev/null && echo 'false' || echo 'true'"
    expected_output: "true"

  - id: mem_total
    category: "Memória"
    title: "Memória Total"
    description: "Informe o tamanho total da memória RAM em kB."
    type: "input_match"
    check_command: "grep MemTotal /proc/meminfo | sed 's/MemTotal: *//' | cut -d' ' -f1"

  - id: mem_cache
    category: "Memória Cache L3"
    title: "Memória Cache L3"
    description: "Informe o tamanho total da memória Cache L3 em MiB."
    type: "input_match"
    check_command: "lscpu | grep 'L3' | sed 's/.*: //' | sed 's/ *//' | cut -d' ' -f1 | head -1"

  - id: swap_status
    category: "Memória"
    title: "Estado do Swap"
    description: "Desative todas as partições de swap do sistema usando 'sudo swapoff -a'."
    type: "passive"
    check_command: "[[ $(wc -l < /proc/swaps) -eq 1 ]] && echo 'true' || echo 'false'"
    expected_output: "true"

  - id: disk_video
    category: "Dispositivos"
    title: "Placa de Vídeo"
    description: "Utilize o comando 'lspci' para identificar o modelo da placa de vídeo (VGA)."
    type: "input_match"
    check_command: "lspci | grep VGA | sed 's/.*: //'"
